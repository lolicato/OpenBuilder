name: OpenBuilder
channels:
  - conda-forge
  - defaults
dependencies:
  - python=3.10  # Upgrade to 3.10 for better compatibility
  - numpy
  - pandas
  - scipy
  - matplotlib
  - seaborn
  - jupyter
  - jupyterlab
  - streamlit
  - tqdm
  - pyqt=5.15.7  # Compatible version of PyQt
  - qtconsole=5.6.1  # Works with PyQt 5.15.7
  - sip=6.7.12  # Ensuring compatibility
  - mdanalysis
  - pip
  - pip:
      - coby
      - alphashape
      - click
      - click-log
      - fasteners
      - griddataformats
      - mda-xdrlib
      - mmtf-python
      - mrcfile
      - msgpack
      - networkx
      - py3dmol
      - pyqt5-sip
      - pyqtchart
      - rtree
      - shapely
      - streamlit-molstar
      - threadpoolctl
      - trimesh
      - watchdog

